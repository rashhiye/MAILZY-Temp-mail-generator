<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#3B82F6"/>
  
  <!-- Mail envelope -->
  <rect x="25" y="35" width="50" height="30" rx="2" fill="white" stroke="#3B82F6" stroke-width="0"/>
  
  <!-- Envelope flap -->
  <path d="M 25 35 L 50 50 L 75 35" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Envelope body -->
  <path d="M 25 35 L 25 60 Q 25 62 27 62 L 73 62 Q 75 62 75 60 L 75 35" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Letter inside envelope -->
  <line x1="30" y1="45" x2="45" y2="45" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <line x1="30" y1="50" x2="55" y2="50" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <line x1="30" y1="55" x2="50" y2="55" stroke="white" stroke-width="1.5" opacity="0.8"/>
</svg>